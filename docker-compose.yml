name: jellyfin-docker

networks:
  media:
    driver: bridge

x-linuxserver-env: &linuxserver_env
  PUID: ${PUID:?Set PUID in .env}
  PGID: ${PGID:?Set PGID in .env}
  TZ: ${TZ:?Set TZ in .env}

x-service-dns: &service_dns
  - 1.1.1.1
  - 1.0.0.1

x-http-healthcheck: &http_healthcheck_defaults
  interval: 30s
  timeout: 10s
  retries: 5
  start_period: 30s

services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    restart: unless-stopped
    environment:
      TZ: ${TZ:?Set TZ in .env}
      VPN_SERVICE_PROVIDER: mullvad
      VPN_TYPE: wireguard
      WIREGUARD_ADDRESSES: ${WIREGUARD_ADDRESSES:?Set WIREGUARD_ADDRESSES in .env}
      WIREGUARD_PRIVATE_KEY: ${WIREGUARD_PRIVATE_KEY:?Set WIREGUARD_PRIVATE_KEY in .env}
      WIREGUARD_PUBLIC_KEY: ${WIREGUARD_PUBLIC_KEY:?Set WIREGUARD_PUBLIC_KEY in .env}
      WIREGUARD_ENDPOINT: ${WIREGUARD_ENDPOINT:?Set WIREGUARD_ENDPOINT in .env}
      WIREGUARD_ALLOWED_IPS: ${WIREGUARD_ALLOWED_IPS:?Set WIREGUARD_ALLOWED_IPS in .env}
      SERVER_COUNTRIES: ${SERVER_COUNTRIES:-Sweden}
      DNS: 1.1.1.1
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - media

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy
    restart: unless-stopped
    environment:
      <<: *linuxserver_env
      WEBUI_PORT: 8080
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080 || exit 1"]
      <<: *http_healthcheck_defaults
    volumes:
      - ${COMMON_PATH:?Set COMMON_PATH in .env}/Qbittorrent/Config:/config
      - ${COMMON_PATH:?Set COMMON_PATH in .env}/Downloads:/data/downloads

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    networks:
      - media
    environment:
      <<: *linuxserver_env
      URL_BASE: /sonarr
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8989/sonarr || exit 1"]
      <<: *http_healthcheck_defaults
    volumes:
      - ${COMMON_PATH:?Set COMMON_PATH in .env}/Sonarr/Config:/config
      - ${COMMON_PATH:?Set COMMON_PATH in .env}/Sonarr/Backup:/data/Backup
      - ${COMMON_PATH:?Set COMMON_PATH in .env}/Sonarr/tvshows:/data/tvshows
      - ${COMMON_PATH:?Set COMMON_PATH in .env}/Downloads:/data/downloads

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    networks:
      - media
    environment:
      <<: *linuxserver_env
      URL_BASE: /radarr
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:7878/radarr || exit 1"]
      <<: *http_healthcheck_defaults
    volumes:
      - ${COMMON_PATH:?Set COMMON_PATH in .env}/Radarr/Config:/config
      - ${COMMON_PATH:?Set COMMON_PATH in .env}/Radarr/Backup:/data/Backup
      - ${COMMON_PATH:?Set COMMON_PATH in .env}/Radarr/movies:/data/movies
      - ${COMMON_PATH:?Set COMMON_PATH in .env}/Downloads:/data/downloads

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    networks:
      - media
    dns: *service_dns
    environment:
      <<: *linuxserver_env
      URL_BASE: /prowlarr
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:9696/prowlarr || exit 1"]
      <<: *http_healthcheck_defaults
    volumes:
      - ${COMMON_PATH:?Set COMMON_PATH in .env}/Prowlarr/Config:/config
      - ${COMMON_PATH:?Set COMMON_PATH in .env}/Prowlarr/Backup:/data/Backup
      - ${COMMON_PATH:?Set COMMON_PATH in .env}/Downloads:/data/downloads

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    restart: unless-stopped
    networks:
      - media
    environment:
      <<: *linuxserver_env
      URL_BASE: /bazarr
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:6767/bazarr || exit 1"]
      <<: *http_healthcheck_defaults
    volumes:
      - ${COMMON_PATH:?Set COMMON_PATH in .env}/Bazarr/Config:/config
      - ${COMMON_PATH:?Set COMMON_PATH in .env}/Sonarr/tvshows:/data/tvshows
      - ${COMMON_PATH:?Set COMMON_PATH in .env}/Radarr/movies:/data/movies

  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    user: ${PUID:?Set PUID in .env}:${PGID:?Set PGID in .env}
    restart: unless-stopped
    networks:
      - media
    environment:
      TZ: ${TZ:?Set TZ in .env}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8096/health || wget -q --spider http://127.0.0.1:8096 || exit 1"]
      <<: *http_healthcheck_defaults
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ${COMMON_PATH:?Set COMMON_PATH in .env}/Jellyfin/Config:/config
      - ${COMMON_PATH:?Set COMMON_PATH in .env}/Jellyfin/Cache:/cache
      - ${COMMON_PATH:?Set COMMON_PATH in .env}/Sonarr/tvshows:/data/tvshows
      - ${COMMON_PATH:?Set COMMON_PATH in .env}/Radarr/movies:/data/movies
      - ${COMMON_PATH:?Set COMMON_PATH in .env}/Downloads:/data/downloads

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    networks:
      - media
    dns: *service_dns
    environment:
      LOG_LEVEL: info
      LOG_HTML: "false"
      CAPTCHA_SOLVER: none
      TZ: ${TZ:?Set TZ in .env}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8191 || exit 1"]
      <<: *http_healthcheck_defaults

  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    restart: unless-stopped
    networks:
      - media
    ports:
      - "${JELLYSEERR_PORT:-5055}:5055"
    depends_on:
      jellyfin:
        condition: service_healthy
      sonarr:
        condition: service_healthy
      radarr:
        condition: service_healthy
    environment:
      LOG_LEVEL: info
      TZ: ${TZ:?Set TZ in .env}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:5055/api/v1/status || wget -q --spider http://127.0.0.1:5055 || exit 1"]
      <<: *http_healthcheck_defaults
    volumes:
      - ${COMMON_PATH:?Set COMMON_PATH in .env}/Jellyseerr/Config:/app/config

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    networks:
      - media
    environment:
      PUID: ${PUID:?Set PUID in .env}
      PGID: ${PGID:?Set PGID in .env}
      HOMEPAGE_ALLOWED_HOSTS: "*"
      HOMEPAGE_VAR_JELLYSEERR_URL: ${JELLYSEERR_EXTERNAL_URL:-http://localhost:5055}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000 || exit 1"]
      <<: *http_healthcheck_defaults
    volumes:
      - ${COMMON_PATH:?Set COMMON_PATH in .env}/Homepage/Config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro

  nginx-proxy:
    image: nginx:latest
    container_name: nginx-proxy
    restart: unless-stopped
    networks:
      - media
    depends_on:
      jellyfin:
        condition: service_healthy
      sonarr:
        condition: service_healthy
      radarr:
        condition: service_healthy
      prowlarr:
        condition: service_healthy
      bazarr:
        condition: service_healthy
      qbittorrent:
        condition: service_healthy
      homepage:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - ${NGINX_PORT:-8090}:80
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/logs:/var/log/nginx
