name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Repo
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install CI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck yamllint

      - name: Run CI checks
        run: bash scripts/ci.sh
